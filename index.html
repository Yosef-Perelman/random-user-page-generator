<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random User Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="profilePic">
        <img id="profilePicture" src="" alt="Profile Picture" />
      </div>
      <div class="details">
        <div id="name" class="name"></div>
        <div id="address" class="address"></div>
      </div>
    </header>
    <main>
      <div class="data">
        <div class="quoteSection">
          <div class="quoteTitle">Favorite quote:</div>
          <div id="quoteText"></div>
        </div>
        <div class="pokemon">
          <img id="pokePic" src="" alt="image of pokemon" />
          <div class="pokeName" id="pokeName"></div>
        </div>
        <div class="about">
          <div id="aboutText" class="aboutText"></div>
        </div>
      </div>
      <div class="friends">
        <div class="friendsTitle">Friends</div>
        <ul class="friendsList" id="friendsList"></ul>
      </div>
    </main>
    <footer><button id="generateButton">Generate User</button></footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
